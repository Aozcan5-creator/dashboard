  a(1,0,'vpl','VU · bis 13:00');a(1,1,'bst2','UE');a(1,2,'strpl','UE · bis 11:15');
  a(1,3,'ebw','VU');a(1,4,'fels','VO');
  a(2,2,'geo2','VO');a(2,4,'fels','UE');
  a(3,2,'rm2','');a(3,3,'geo2','UE');
  a(4,0,'robo','VU · 16:30–18:00');a(4,3,'hydro','II · 16:30–18:00');a(4,3,'mech2','UE · 16:30–18:00');
}
prefill();

function getActive(){
  const ids=new Set();
  cells.flat().flat().forEach(e=>{if(e.mid)ids.add(e.mid)});
  return[...ids].map(find).filter(Boolean);
}

// ── Renders ──
function renderSP(){
  let h='';TL.forEach((time,t)=>{h+=`<tr><td>${time}</td>`;
  for(let d=0;d<5;d++){const it=cells[t][d];h+=`<td onclick="openM(${t},${d})">`;
  if(!it.length)h+=`<div class="ah"></div>`;
  else{h+=`<div class="slot">`;it.forEach(e=>h+=`<div class="ev c-${e.color}"><span class="n">${e.name}</span>${e.label?`<span class="m">${e.label}</span>`:''}</div>`);h+=`</div>`}
  h+=`</td>`}h+=`</tr>`});
  document.getElementById('spb').innerHTML=h;
}
function deIso(d){if(!d)return'';const p=d.split('.');return p.length===3?`${p[2]}-${p[1]}-${p[0]}`:''}
function parseDe(s){if(!s)return'9999';const p=s.split('.');return p[2]+p[1]+p[0]}
function renderPR(){
  let th=`<tr><th>Modul</th><th>Datum</th><th>Klausuruhrzeit</th><th>CP</th><th>Richtung</th><th>Status</th><th style="width:24px"></th></tr>`;document.getElementById('pth').innerHTML=th;
  const act=getActive().sort((a,b)=>parseDe(a.ex)>parseDe(b.ex)?1:-1);
  let h='';
  act.forEach(m=>{h+=`<tr><td contenteditable>${m.n}</td><td><input type="date" value="${deIso(m.ex)}"></td><td contenteditable>${m.et||''}</td><td contenteditable>${m.cp}</td><td><span class="pill c-${catColor(m.c)}">${catName(m.c)}</span></td><td><select class="st" onchange="statuses['${m.id}']=this.value"><option${!statuses[m.id]||statuses[m.id]==='offen'?' selected':''}>offen</option><option${statuses[m.id]==='angemeldet'?' selected':''}>angemeldet</option><option${statuses[m.id]==='bestanden'?' selected':''}>bestanden</option></select></td><td></td></tr>`});
  manRows.forEach((r,i)=>{h+=`<tr><td contenteditable>${r.name||''}</td><td><input type="date" value="${r.isoDate||''}"></td><td contenteditable>${r.et||''}</td><td contenteditable>${r.cp||''}</td><td contenteditable>${r.cat||''}</td><td><select class="st"><option>offen</option><option>angemeldet</option><option>bestanden</option></select></td><td><button class="dbtn" onclick="manRows.splice(${i},1);renderPR();renderMOD()">&times;</button></td></tr>`});
  if(!act.length&&!manRows.length)h=`<tr><td colspan="7" style="text-align:center;color:var(--tx3);padding:16px">Kurse im Stundenplan hinzufügen</td></tr>`;
  document.getElementById('prb').innerHTML=h;
}
function renderMOD(){
  const act=getActive().sort((a,b)=>(a.s||99)-(b.s||99));
  let h='',sum=0;
  act.forEach(m=>{sum+=m.cp;h+=`<tr><td>${m.n}</td><td>${m.s||'–'}</td><td>${m.cp}</td><td><span class="pill c-${catColor(m.c)}">${catName(m.c)}</span></td></tr>`});
  manRows.forEach(r=>{const cp=parseInt(r.cp)||0;sum+=cp;h+=`<tr><td>${r.name||'–'}</td><td>–</td><td>${cp||'–'}</td><td>${r.cat||'–'}</td></tr>`});
  document.getElementById('mob').innerHTML=h||`<tr><td colspan="4" style="text-align:center;color:var(--tx3);padding:16px">–</td></tr>`;
  document.getElementById('cps').textContent=sum;
}
function render(){renderSP();renderPR();renderMOD()}

// ── Modal ──
function openM(t,d){curT=t;curD=d;selCol='coral';formOpen=false;renderMdl();document.getElementById('ov').classList.add('open');document.body.style.overflow='hidden'}
function closeM(){document.getElementById('ov').classList.remove('open');document.body.style.overflow=''}
function togForm(){formOpen=!formOpen;renderMdl()}
function pickC(c){selCol=c;document.querySelectorAll('.cd').forEach(d=>d.classList.remove('sel'));
  const el=document.querySelector(`.cd[data-c="${c}"]`);if(el)el.classList.add('sel')}

function renderMdl(){
  const it=cells[curT][curD];
  let h=`<h3>${DL[curD]} · ${TL[curT]}</h3><div class="mt">Kurse in diesem Zeitblock</div>`;
  if(it.length){h+=`<div class="mcur">`;it.forEach((e,i)=>h+=`<div class="mci"><div class="ev c-${e.color}" style="flex:1"><span class="n">${e.name}</span>${e.label?`<span class="m">${e.label}</span>`:''}</div><button class="dbtn" onclick="rmCell(${i})">×</button></div>`);h+=`</div>`}
  else h+=`<div style="color:var(--tx3);font-size:12px;margin-bottom:10px">Noch keine Kurse</div>`;

  // Custom create toggle
  h+=`<div class="ms">Kurs hinzufügen</div>`;
  h+=`<button class="tog${formOpen?' open':''}" onclick="togForm()">&#10010; Eigenes Modul erstellen <span class="arr">&#9660;</span></button>`;
  h+=`<div class="cform${formOpen?' open':''}">`;
  h+=`<label>Name *</label><input class="mi" id="cn" placeholder="z.B. BWL Grundlagen">`;
  h+=`<div class="mrow"><div><label>CP</label><input class="mi" id="ccp" type="number" placeholder="5"></div><div><label>SWS</label><input class="mi" id="csws" type="number" placeholder="3"></div><div><label>Semester</label><input class="mi" id="csem" type="number" placeholder="4"></div></div>`;
  h+=`<label>Richtung</label><select class="mi" id="ccat"><option value="">– wählen –</option>`;
  allCats().forEach(c=>h+=`<option value="${c.key}">${c.name}</option>`);
  h+=`<option value="__new">+ Neue Richtung…</option></select>`;
  h+=`<input class="mi" id="cncat" placeholder="Name der neuen Richtung" style="display:none">`;
  h+=`<div class="mrow"><div><label>Klausurdatum</label><input class="mi" id="cex" type="date"></div><div><label>Uhrzeit</label><input class="mi" id="cet" placeholder="10:00–12:00"></div></div>`;
  h+=`<label>Typ im Stundenplan</label><input class="mi" id="clab" placeholder="z.B. VO, UE, VU">`;
  h+=`<label>Farbe</label><div class="mcolors">`;
  COLS.forEach(c=>h+=`<div class="cd${c===selCol?' sel':''}" data-c="${c}" style="background:var(--${c}-bg)" onclick="pickC('${c}')"></div>`);
  h+=`</div><button class="mb mb-a" onclick="doAddCust()">Erstellen & hinzufügen</button></div>`;

  // Predefined select
  h+=`<div class="ms">Oder aus Liste wählen</div>`;
  h+=`<select class="mi" id="msel"><option value="">— Modul wählen —</option>`;
  Object.keys(CN).forEach(cat=>{const ms=P.filter(m=>m.c===cat);h+=`<optgroup label="${CN[cat]}">`;ms.forEach(m=>h+=`<option value="${m.id}">${m.n} (${m.cp} CP)</option>`);h+=`</optgroup>`});
  if(custMods.length){h+=`<optgroup label="Eigene Module">`;custMods.forEach(m=>h+=`<option value="${m.id}">${m.n} (${m.cp} CP)</option>`);h+=`</optgroup>`}
  h+=`</select>`;
  h+=`<input class="mi" id="mlab" placeholder="Typ (VO, UE, VU…)">`;
  h+=`<button class="mb mb-a" onclick="doAddSel()">Hinzufügen</button>`;
  h+=`<button class="mb mb-c" onclick="closeM()">Schließen</button>`;
  document.getElementById('mdl').innerHTML=h;

  // New Richtung toggle
  const catSel=document.getElementById('ccat');
  if(catSel)catSel.onchange=function(){document.getElementById('cncat').style.display=this.value==='__new'?'block':'none'};
}

function doAddCust(){
  const name=document.getElementById('cn').value.trim();
  if(!name)return;
  const cp=parseInt(document.getElementById('ccp').value)||0;
  const sws=parseInt(document.getElementById('csws').value)||0;
  const sem=parseInt(document.getElementById('csem').value)||0;
  let catKey=document.getElementById('ccat').value;
  const newCat=document.getElementById('cncat').value.trim();
  if(catKey==='__new'&&newCat){catKey='cust_'+newCat.toLowerCase().replace(/[^a-z0-9]/g,'');
    if(!custCats.find(c=>c.key===catKey))custCats.push({key:catKey,name:newCat,color:selCol})}
  const exRaw=document.getElementById('cex').value;
  const ex=exRaw?exRaw.split('-').reverse().join('.') :'';
  const et=document.getElementById('cet').value.trim();
  const label=document.getElementById('clab').value.trim();
  const id='c_'+Date.now();
  const mod={id,n:name,s:sem,cp,sws,c:catKey||'',ex,et,co:selCol};
  custMods.push(mod);
  cells[curT][curD].push({mid:id,name,label,color:selCol});
  render();renderMdl();
}

function doAddSel(){
  const sel=document.getElementById('msel').value;if(!sel)return;
  const m=find(sel);if(!m)return;
  const label=document.getElementById('mlab').value.trim();
  cells[curT][curD].push({mid:sel,name:m.n,label,color:m.co});
  render();renderMdl();
}
function rmCell(i){cells[curT][curD].splice(i,1);render();renderMdl()}

// Table
function addManRow(){manRows.push({name:'',ex:'',et:'',cp:'',cat:'',isoDate:''});renderPR();renderMOD()}
function doExport(){
  const b=document.querySelector('.xp');b.textContent='Erstelle…';
  if(typeof html2canvas==='undefined'){b.textContent='Screenshot nutzen';setTimeout(()=>b.innerHTML='&#128247; Als Bild speichern',3e3);return}
  html2canvas(document.getElementById('cap'),{backgroundColor:getComputedStyle(document.body).getPropertyValue('--bg').trim()||'#FAFAF8',scale:2}).then(c=>{
    const a=document.createElement('a');a.download='semester_dashboard.png';a.href=c.toDataURL('image/png');a.click();b.innerHTML='&#128247; Als Bild speichern';
  }).catch(()=>{b.textContent='Fehler';setTimeout(()=>b.innerHTML='&#128247; Als Bild speichern',3e3)})
}
render();
</script>
